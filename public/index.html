<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />

    <!--
      viewport — OBLIGATOIRE pour le responsive mobile-first.
      width=device-width : largeur = largeur de l'écran physique
      initial-scale=1    : pas de zoom au chargement
      viewport-fit=cover : couvre le notch / Dynamic Island iPhone
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Couleur de la barre de statut mobile (Chrome Android) -->
    <meta name="theme-color" content="#059669" />

    <!-- Description SEO -->
    <meta
      name="description"
      content="Factur-X 2026 — Générateur de factures électroniques
               conformes EN 16931 et DGFiP 2026. PDF/A-3b + XML embarqué."
    />

    <!-- Empêche la détection automatique des numéros de téléphone sur iOS -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Icône onglet navigateur -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Icône écran d'accueil iPhone -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      Police Inter — preconnect accélère la connexion Google Fonts.
      display=swap évite le flash de texte invisible (FOIT).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Factur-X 2026 — Facturation électronique DGFiP</title>
  </head>

  <body>
    <!--
      Affiché uniquement si JavaScript est désactivé dans le navigateur.
      React nécessite JavaScript pour fonctionner.
    -->
    <noscript>
      JavaScript est requis pour utiliser cette application.
    </noscript>

    <!--
      Point de montage de l'application React.
      src/index.js appelle :
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
      et injecte toute l'interface dans cette div.
    -->
    <div id="root"></div>

    <!--
      Les fichiers JS compilés et CSS sont injectés automatiquement
      par react-scripts (npm start / npm build).
      Ne PAS ajouter de balises <script> manuellement ici.
    -->
  </body>
</html>
